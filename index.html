<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JHTV Second Brain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>JHTV Second Brain</h1>
  <span>VC–Technology Matching Tool</span>
</header>

<main class="container">

  <div class="search-card">
    <label for="vcInput">Enter a VC firm name</label>
    <div class="search-row">
      <input type="text" id="vcInput" placeholder="e.g. Blueprint Health, Andreessen Horowitz..." autocomplete="off">
      <button class="btn btn-primary" onclick="search()">Search</button>
    </div>
    <div class="browse-toggle">
      <button class="btn-link" onclick="toggleBrowse()">Browse all technologies</button>
    </div>
  </div>

  <div id="results"></div>

  <div id="emptyState" class="empty-state">
    Search a VC above to see matched JHTV technology one-pagers,<br>or browse the full technology catalog below.
  </div>

</main>

<script>
  // ── Data ──────────────────────────────────────────────────────────────────
  let VCS   = [];
  let TECHS = [];
  let browseOpen = false;

  async function loadData() {
    try {
      [VCS, TECHS] = await Promise.all([
        fetch('data/vcs.json').then(r => r.json()),
        fetch('data/technologies.json').then(r => r.json()),
      ]);
    } catch (e) {
      document.getElementById('emptyState').textContent =
        'Failed to load data. Run the app via a local server or GitHub Pages.';
    }
  }

  // ── Search ────────────────────────────────────────────────────────────────
  const input   = document.getElementById('vcInput');
  const results = document.getElementById('results');
  const empty   = document.getElementById('emptyState');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

  // ── Fuzzy matching ────────────────────────────────────────────────────────
  function norm(s) {
    return s.toLowerCase().replace(/[^a-z0-9]/g, '');
  }

  function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length: m + 1}, () => Array(n + 1).fill(0));
    for (let i = 0; i <= m; i++) dp[i][0] = i;
    for (let j = 0; j <= n; j++) dp[0][j] = j;
    for (let i = 1; i <= m; i++)
      for (let j = 1; j <= n; j++)
        dp[i][j] = a[i-1] === b[j-1]
          ? dp[i-1][j-1]
          : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[m][n];
  }

  function bestFuzzyMatch(query) {
    const q = norm(query);
    if (!q || q.length < 2) return null;

    let best = null;
    let bestScore = Infinity;

    for (const vc of VCS) {
      const candidates = [vc.name, ...(vc.aliases || [])];
      for (const c of candidates) {
        const key = norm(c);
        const dist = levenshtein(q, key);
        if (dist < bestScore) { bestScore = dist; best = vc; }
      }
    }

    const threshold = Math.max(2, Math.floor(q.length * 0.4));
    return bestScore <= threshold ? best : null;
  }

  function search() {
    const q = input.value.trim().toLowerCase();
    browseOpen = false;

    if (!q) {
      showEmpty();
      return;
    }

    const techMap = Object.fromEntries(TECHS.map(t => [t.id, t]));

    const match = VCS.find(vc =>
      vc.name.toLowerCase().includes(q) ||
      (vc.aliases || []).some(a => a.toLowerCase().includes(q))
    );

    results.style.display = 'block';
    empty.style.display   = 'none';

    if (match) {
      const technologies = (match.matchedTechs || []).map(id => techMap[id]).filter(Boolean);
      results.innerHTML = foundHTML(match, technologies);
      return;
    }

    const fuzzy = bestFuzzyMatch(input.value.trim());
    if (fuzzy) {
      const technologies = (fuzzy.matchedTechs || []).map(id => techMap[id]).filter(Boolean);
      results.innerHTML = didYouMeanHTML(fuzzy.name) + foundHTML(fuzzy, technologies);
    } else {
      results.innerHTML = notFoundHTML(input.value.trim());
    }
  }

  // ── Browse mode ───────────────────────────────────────────────────────────
  function toggleBrowse() {
    browseOpen = !browseOpen;
    if (!browseOpen) { showEmpty(); return; }

    results.style.display = 'block';
    empty.style.display   = 'none';
    results.innerHTML = `
      <p class="section-label">${TECHS.length} technolog${TECHS.length === 1 ? 'y' : 'ies'} in catalog</p>
      <div class="tech-grid">${TECHS.map(t => techCardHTML(t)).join('')}</div>
    `;
  }

  function showEmpty() {
    results.style.display = 'none';
    empty.style.display   = 'block';
    results.innerHTML = '';
  }

  // ── Render helpers ────────────────────────────────────────────────────────
  function foundHTML(vc, techs) {
    const stagePills  = (vc.stage   || []).map(s => `<span class="pill">${s}</span>`).join('');
    const sectorPills = (vc.sectors || []).map(s => `<span class="pill">${s}</span>`).join('');

    const vcBriefBtn = vc.vcOnePager
      ? `<button class="btn btn-gold" onclick="downloadVC('${vc.vcOnePager}')">Download VC Brief (PDF)</button>`
      : '';

    const downloadAllBtn = techs.length > 1
      ? `<button class="btn btn-secondary" onclick="downloadAllTech(${JSON.stringify(techs.map(t => t.onePager))})">
           Download All Tech One-Pagers (${techs.length})
         </button>`
      : '';

    return `
      <div class="vc-header">
        <div>
          <h2>${vc.name}</h2>
          <div class="vc-meta">${sectorPills}${stagePills}</div>
        </div>
        <div class="vc-actions">
          ${vcBriefBtn}
          ${downloadAllBtn}
        </div>
      </div>
      <p class="section-label">${techs.length} matched technolog${techs.length === 1 ? 'y' : 'ies'}</p>
      <div class="tech-grid">${techs.map(t => techCardHTML(t)).join('')}</div>
    `;
  }

  function techCardHTML(t) {
    const tags        = (t.sectors || []).map(s => `<span class="pill">${s}</span>`).join('');
    const downloadBtn = t.onePager
      ? `<button class="btn btn-primary btn-sm" onclick="downloadTech('${t.onePager}')">Download .docx</button>`
      : `<button class="btn btn-primary btn-sm" disabled>No file</button>`;

    return `
      <div class="tech-card">
        <h3>${t.name}</h3>
        ${t.pi          ? `<p class="pi">${t.pi}</p>` : ''}
        ${t.description ? `<p class="desc">${t.description}</p>` : ''}
        <div class="tags">${tags}${t.stage ? `<span class="pill">${t.stage}</span>` : ''}</div>
        <div class="actions">${downloadBtn}</div>
      </div>
    `;
  }

  function didYouMeanHTML(name) {
    return `<div class="did-you-mean">Did you mean <strong>${name}</strong>?</div>`;
  }

  function notFoundHTML(q) {
    return `
      <div class="not-found">
        <h2>No results for &ldquo;${q}&rdquo;</h2>
        <p>This VC isn&rsquo;t in the database yet. Add them to <code>data/vcs.json</code>.</p>
      </div>
    `;
  }

  // ── Downloads ─────────────────────────────────────────────────────────────
  function downloadFile(href, filename) {
    const a = document.createElement('a');
    a.href     = href;
    a.download = filename;
    a.click();
  }

  function downloadTech(filename) {
    downloadFile(`one-pagers/Tech One Pagers/${filename}`, filename);
  }

  function downloadVC(filename) {
    downloadFile(`one-pagers/VC One Pagers/Completed One Pagers /${filename}`, filename);
  }

  function downloadAllTech(filenames) {
    filenames.forEach((filename, i) => {
      setTimeout(() => downloadTech(filename), i * 800);
    });
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadData();
</script>

</body>
</html>
