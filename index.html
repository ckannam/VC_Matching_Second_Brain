<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JHTV Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,600;0,700;1,600&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="grant_checker.js" defer></script>
  <script src="taxonomy.js" defer></script>
  <script src="scoring.js" defer></script>
</head>
<body>

<nav class="top-nav">
  <div class="nav-inner">
    <div class="nav-brand">
      <div class="nav-logo">JH</div>
      <span class="nav-name">JHTV Second Brain</span>
    </div>
    <div class="nav-links">
      <button class="nav-link" onclick="showDomainBrowse()">Catalog</button>
      <button class="nav-link" onclick="showSavedBriefs()">Saved briefs</button>
      <button class="nav-link" onclick="showGrantChecker()">Grant checker</button>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="hero-inner">
    <p class="hero-label">JOHNS HOPKINS TECHNOLOGY VENTURES</p>
    <h1 class="hero-title">Which Hopkins technologies fit your investor?</h1>
    <p class="hero-sub">Search a VC firm to surface matched technologies and export a tailored brief.</p>
    <div class="hero-search">
      <div class="search-row">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="8.5" cy="8.5" r="5.5"/><path d="M15 15l-3-3"/>
        </svg>
        <input type="text" id="vcInput" placeholder="Search firms, technologies, or people" autocomplete="off" aria-autocomplete="list">
        <button class="btn btn-dark" onclick="search()">Search</button>
      </div>
      <div class="search-suggest" id="searchSuggest" role="listbox" style="display:none"></div>
      <div class="popular-row">
        <span class="popular-label">Popular:</span>
        <button class="chip" onclick="searchFor('Lux Capital')">Lux Capital</button>
        <button class="chip" onclick="searchFor('NEA')">NEA</button>
        <button class="chip" onclick="searchFor('Felicis')">Felicis</button>

  </div>
</section>

<section class="page-body">
  <div id="results" style="display:none"></div>
  <div id="domainBrowse"></div>
</section>

<div id="previewModal" onclick="if(event.target===this)closePreview()">
  <div id="previewBox">
    <div id="previewHeader">
      <span id="previewTitle"></span>
      <div id="previewHeaderActions">
        <button class="btn btn-secondary btn-sm" onclick="downloadCurrentPreview()">Download</button>
        <button id="previewClose" onclick="closePreview()" title="Close">&#x2715;</button>
      </div>
    </div>
    <div id="previewBody">
      <iframe id="previewFrame" src=""></iframe>
      <div id="previewFallback">
        <p>Office documents can&rsquo;t be previewed locally &mdash; run via GitHub Pages for live preview.</p>
        <button class="btn btn-primary btn-sm" onclick="downloadCurrentPreview()">Download to view</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const RESEARCH_SERVER = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? `${location.protocol}//${location.hostname}:3000`
    : 'https://vc-matching-second-brain.onrender.com';

  // ── Data ──────────────────────────────────────────────────────────────────
  let VCS             = [];
  let TECHS           = [];
  let JHU_CONNECTIONS = [];
  let PORTFOLIO_BY_VC = new Map();  // vc.id → [{ name, domains[], stage? }] (rubric v2)
  let _grantPrefill = null; // set by "Refine eligibility" before routing to #/grants

  async function loadData() {
    try {
      let portfolios, investorsRaw;
      [VCS, TECHS, JHU_CONNECTIONS, JHTV_RELATIONSHIPS, portfolios, investorsRaw] = await Promise.all([
        fetch('data/vcs.json').then(r => r.json()),
        fetch('data/technologies.json').then(r => r.json()),
        fetch('data/jhu_connections.json').then(r => r.json()),
        fetch('data/jhtv_relationships.json').then(r => r.ok ? r.json() : []).catch(() => []),
        fetch('data/vc_portfolios.json').then(r => r.ok ? r.json() : []).catch(() => []),
        fetch('data/jhtv_investors.json').then(r => r.ok ? r.json() : { investors: [] }).catch(() => ({ investors: [] })),
      ]);
      PORTFOLIO_BY_VC = new Map(portfolios.map(e => [e.vcId, e.companies]));
      // Only venture/angel enter the UI; foundation/public are a deferred pass.
      JHTV_INVESTORS = (investorsRaw.investors || []).filter(i => i.type === 'venture' || i.type === 'angel');
      renderDomainBrowse();
      const uniqueFirms = new Set(JHU_CONNECTIONS.map(c => c.firm)).size;
      document.getElementById('statLine').textContent =
        `${TECHS.length} technologies · ${VCS.length} firms profiled · ${JHU_CONNECTIONS.length} JHU contacts across ${uniqueFirms} firms`;
      resolveRelationships();
      resolveInvestors();
      buildSearchIndex();
      dispatchRoute();
    } catch (e) {
      document.getElementById('domainBrowse').textContent =
        'Failed to load data. Run via a local server or GitHub Pages.';
    }
  }

  // ── Domain colors ─────────────────────────────────────────────────────────
  const DOMAIN_COLORS = {
    'Digital Health':        '#0891B2',
    'Medical Devices':       '#2563EB',
    'Clean Tech':            '#16A34A',
    'Cybersecurity':         '#DC2626',
    'Therapeutics':          '#7C3AED',
    'Diagnostics':           '#D97706',
    'Agricultural Tech':     '#65A30D',
    'Research Technologies': '#64748B',
  };

  // ── Domain icons ──────────────────────────────────────────────────────────
  const DOMAIN_ICONS = {
    'Digital Health':        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>`,
    'Medical Devices':       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 12h6M12 9v6"/></svg>`,
    'Clean Tech':            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a7 7 0 017 7c0 4-3 7-7 9-4-2-7-5-7-9a7 7 0 017-7z"/><path d="M12 9v6M9 12h6"/></svg>`,
    'Cybersecurity':         `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l8 4v6c0 4.4-3.4 8.5-8 10-4.6-1.5-8-5.6-8-10V6l8-4z"/><path d="M9 12l2 2 4-4"/></svg>`,
    'Therapeutics':          `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 014 0v2M12 11v6M9 14h6"/></svg>`,
    'Diagnostics':           `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>`,
    'Agricultural Tech':     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22V12M12 12C12 7 7 4 3 6c4 0 7 3 9 6zM12 12c0-5 5-8 9-6-4 0-7 3-9 6z"/></svg>`,
    'Research Technologies': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 3v11a3 3 0 006 0V3"/><path d="M6 8h12"/><path d="M5 21h14"/></svg>`,
  };

  // ── Domain browse ─────────────────────────────────────────────────────────
  function renderDomainBrowse() {
    const byDomain = {};
    for (const t of TECHS) {
      const secs = (t.sectors && t.sectors.length > 0) ? t.sectors : ['Other'];
      for (const sec of secs) {
        if (!byDomain[sec]) byDomain[sec] = [];
        byDomain[sec].push(t);
      }
    }

    const domainOrder = [
      'Digital Health','Medical Devices','Clean Tech','Cybersecurity',
      'Therapeutics','Diagnostics','Agricultural Tech','Research Technologies','Other'
    ];
    const sorted = domainOrder.filter(d => byDomain[d]);

    const cards = sorted.map(d => domainCardHTML(d, byDomain[d])).join('');

    document.getElementById('domainBrowse').innerHTML = `
      <div class="catalog-section">
        <div class="catalog-header">
          <h2>Browse the catalog by domain</h2>
          <button class="view-all-link" onclick="viewAllTechs()">View all ${TECHS.length} →</button>
        </div>
        <div class="domain-grid">${cards}</div>
      </div>
    `;
  }

  function domainCardHTML(sector, techs) {
    const icon  = DOMAIN_ICONS[sector] || DOMAIN_ICONS['Research Technologies'];
    const color = DOMAIN_COLORS[sector] || '#64748B';
    const count = techs.length;
    const names = techs.slice(0, 4).map(t =>
      `<span class="domain-tech-link" onclick="event.stopPropagation();viewTech('${t.id}')" title="View funding profile">${t.name}</span>`
    ).join('');
    const more = count > 4 ? `<span class="domain-tech-more">+${count - 4} more</span>` : '';
    return `
      <div class="domain-card" onclick="viewDomain('${sector.replace(/'/g,"\\'")}')">
        <div class="domain-card-top">
          <div class="domain-icon" style="color:${color}">${icon}</div>
          <div>
            <div class="domain-name"><span class="domain-dot" style="background:${color}"></span>${sector}</div>
            <div class="domain-count">${count} technolog${count === 1 ? 'y' : 'ies'}</div>
          </div>
        </div>
        <div class="domain-techs">${names}${more}</div>
      </div>
    `;
  }

  function viewDomain(sector) { location.hash = '#/domain/' + encodeURIComponent(sector); }

  // Switch from the domain-browse home to the results pane; returns the pane.
  function showResults() {
    document.getElementById('domainBrowse').style.display = 'none';
    document.body.classList.add('compact-hero');
    const r = document.getElementById('results');
    r.style.display = 'block';
    return r;
  }

  // Route to a hash; if we're already there, re-render (assigning an unchanged
  // location.hash fires no hashchange event).
  function navigate(hash) {
    if (location.hash === hash || (!location.hash && hash === '#/')) dispatchRoute();
    else location.hash = hash;
  }

  function renderDomain(sector) {
    const filtered = TECHS.filter(t => (t.sectors || []).includes(sector));
    if (!filtered.length) { renderHome(); return; }
    const color    = DOMAIN_COLORS[sector] || '#64748B';
    const icon     = DOMAIN_ICONS[sector]  || DOMAIN_ICONS['Research Technologies'];
    showResults().innerHTML = `
      <div class="catalog-section">
        <div class="domain-catalog-header" style="border-left:3px solid ${color}">
          <div class="domain-catalog-icon" style="background:var(--paper);border:1px solid var(--border);color:${color}">${icon}</div>
          <div>
            <div class="domain-catalog-name">${sector}</div>
            <div class="domain-catalog-count">${filtered.length} technolog${filtered.length === 1 ? 'y' : 'ies'}</div>
          </div>
          <button class="view-all-link" onclick="showDomainBrowse()">← Back to domains</button>
        </div>
        <div class="tech-grid domain-tech-grid" data-color="${color}">${filtered.map(t => techCardHTML(t, color)).join('')}</div>
      </div>
    `;
  }

  function showDomainBrowse() { navigate('#/'); }

  function renderHome() {
    document.getElementById('results').style.display = 'none';
    document.getElementById('domainBrowse').style.display = 'block';
    document.body.classList.remove('compact-hero');
    document.getElementById('vcInput').value = '';
  }

  function showSavedBriefs() { location.hash = '#/briefs'; }

  function renderSavedBriefs() {
    const withBriefs = VCS.filter(vc => vc.vcOnePager);
    showResults().innerHTML = `
      <div class="catalog-section">
        <div class="catalog-header">
          <h2>Saved VC Briefs <span class="catalog-count">(${withBriefs.length})</span></h2>
          <button class="view-all-link" onclick="showDomainBrowse()">← Back to catalog</button>
        </div>
        <div class="vc-brief-grid">
          ${withBriefs.map(vc => `
            <div class="vc-brief-card">
              <div class="vc-brief-name">${vc.name}</div>
              ${vc.focus ? `<p class="vc-brief-focus">${vc.focus}</p>` : ''}
              <div class="vc-brief-actions">
                ${vc.vcOnePager ? `<button class="btn btn-secondary btn-sm" onclick="previewVC('${vc.vcOnePager}')">Preview</button>` : ''}
                <button class="btn btn-gold btn-sm" onclick="downloadVC('${vc.vcOnePager}')">Download PDF</button>
                <button class="btn btn-secondary btn-sm" onclick="searchFor('${vc.name.replace(/'/g,"\\'")}')">View matched techs</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  function showGrantChecker() { location.hash = '#/grants'; }

  function renderGrantChecker(prefill) {
    _grantPrefill = null; // consume once; don't leak into a later manual open
    showResults().innerHTML = `
      <div class="catalog-section">
        <div class="catalog-header">
          <h2>Grant Checker</h2>
          <button class="view-all-link" onclick="showDomainBrowse()">← Back to catalog</button>
        </div>
        <p class="grant-disclaimer">Screens all 28 Maryland, federal, and foundation programs against your answers. Shared engine with the founder-facing Grant Finder.</p>
        <div id="grantCheckerMount"></div>
      </div>`;
    renderGrantCheckerForm(document.getElementById('grantCheckerMount'), prefill || null);
  }

  function refineGrantsForTech(techId) {
    const tech = TECHS.find(t => t.id === techId);
    _grantPrefill = tech ? techToGrantPrefill(tech) : null;
    location.hash = '#/grants';
  }

  function viewAllTechs() { location.hash = '#/all'; }

  function renderAllTechs() {
    showResults().innerHTML = `
      <div class="catalog-section">
        <div class="catalog-header">
          <h2>${TECHS.length} technologies in catalog</h2>
          <button class="view-all-link" onclick="showDomainBrowse()">← Back to domains</button>
        </div>
        <div class="tech-grid">${TECHS.map(t => techCardHTML(t)).join('')}</div>
      </div>
    `;
  }

  // ── JHU Connections ──────────────────────────────────────────────────────
  const JHU_STOPWORDS = new Set([
    'capital', 'management', 'managers', 'partners', 'partner',
    'ventures', 'venture', 'fund', 'funds', 'group',
    'holdings', 'holding', 'advisors', 'advisory', 'advisor',
    'investments', 'investment', 'equity', 'operations', 'solutions',
    'sciences', 'services', 'limited', 'company', 'companies',
    'associates', 'life', 'health', 'enterprise', 'new', 'the',
    'llc', 'lp', 'inc', 'corp', 'ltd', 'co'
  ]);

  function jhuTokenize(s) {
    return (s || '')
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')  // strip accents
      .replace(/[^a-z0-9]+/g, ' ')
      .trim().split(/\s+/).filter(Boolean);
  }

  // Edit distance with transpositions counted as 1 ("kohsla" → "khosla")
  function jhuEditDistance(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length: m + 1}, () => Array(n + 1).fill(0));
    for (let i = 0; i <= m; i++) dp[i][0] = i;
    for (let j = 0; j <= n; j++) dp[0][j] = j;
    for (let i = 1; i <= m; i++)
      for (let j = 1; j <= n; j++) {
        dp[i][j] = a[i-1] === b[j-1]
          ? dp[i-1][j-1]
          : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
        if (i > 1 && j > 1 && a[i-1] === b[j-2] && a[i-2] === b[j-1])
          dp[i][j] = Math.min(dp[i][j], dp[i-2][j-2] + 1);
      }
    return dp[m][n];
  }

  // Typo-tolerant token equality: exact for short tokens, 1 edit for tokens ≥5 chars
  function jhuTokensEqual(a, b) {
    if (a === b) return true;
    if (a.length < 5 || b.length < 5) return false;
    if (Math.abs(a.length - b.length) > 1) return false;
    return jhuEditDistance(a, b) <= 1;
  }

  // "NEA (New Enterprise Associates)" → ["nea new enterprise associates", "nea", "new enterprise associates"]
  function jhuNameVariants(name) {
    const variants = [name];
    const base = name.replace(/\([^)]*\)/g, ' ').trim();
    if (base && base !== name) variants.push(base);
    const parens = name.match(/\(([^)]+)\)/g) || [];
    for (const p of parens) variants.push(p.slice(1, -1));
    const seen = new Set();
    return variants
      .map(v => jhuTokenize(v))
      .filter(toks => toks.length && !seen.has(toks.join(' ')) && seen.add(toks.join(' ')));
  }

  // vcIsAlias: short aliases like "Tiger" or "GC" are search shorthand, not
  // official names — they only match exactly or as full multi-token names,
  // never as a loose one-word prefix of a longer firm name.
  function jhuNamesMatch(vcTokens, firmTokens, vcIsAlias) {
    const fullVC   = ' ' + vcTokens.join(' ') + ' ';
    const fullFirm = ' ' + firmTokens.join(' ') + ' ';
    if (fullVC === fullFirm) return true;

    // Whole-name containment, multi-token names only:
    // "sequoia capital" ⊂ "sequoia capital operations llc"
    if (vcTokens.length >= 2 && fullFirm.includes(fullVC)) return true;
    if (firmTokens.length >= 2 && fullVC.includes(fullFirm)) return true;

    // Key-token coverage (typo-tolerant)
    const keyVC   = vcTokens.filter(w => !JHU_STOPWORDS.has(w));
    const keyFirm = firmTokens.filter(w => !JHU_STOPWORDS.has(w));
    if (!keyVC.length || !keyFirm.length) return false;

    // Both names reduce to one distinctive token: "kohsla ventures" ↔ "khosla ventures"
    if (keyVC.length === 1 && keyFirm.length === 1)
      return jhuTokensEqual(keyVC[0], keyFirm[0]);

    // Multi-token side fully covers the other: "general catalyst" ⊂ "general catalyst group management"
    if (keyVC.length >= 2 && keyFirm.length >= 2) {
      const [small, large] = keyVC.length <= keyFirm.length ? [keyVC, keyFirm] : [keyFirm, keyVC];
      return small.every(s => large.some(l => jhuTokensEqual(s, l)));
    }

    // One-word name vs longer name: only match as an anchor on the longer
    // name's first distinctive token ("flagship" → "flagship pioneering"),
    // never from a one-word alias, and never on short/generic tokens
    // ("global" must not pull in "global health investments").
    const [single, multi, singleIsVC] = keyVC.length === 1
      ? [keyVC[0], keyFirm, true] : [keyFirm[0], keyVC, false];
    if (singleIsVC && vcIsAlias) return false;
    return single.length >= 4 && jhuTokensEqual(single, multi[0]);
  }

  function findJHUConnections(vc) {
    const nameVariants  = jhuNameVariants(vc.name);
    const aliasVariants = (vc.aliases || []).flatMap(jhuNameVariants);
    const firmCache = {};

    return JHU_CONNECTIONS.filter(c => {
      if (!(c.firm in firmCache)) {
        const firmVariants = jhuNameVariants(c.firm);
        firmCache[c.firm] = firmVariants.some(f =>
          nameVariants.some(v => jhuNamesMatch(v, f, false)) ||
          aliasVariants.some(v => jhuNamesMatch(v, f, true)));
      }
      return firmCache[c.firm];
    });
  }

  // ── JHTV Relationships ───────────────────────────────────────────────────
  // data/jhtv_relationships.json: [{ firm, tier?, note? }] — firms JHTV works
  // with, written by the team. Joined to vcs.json entries by name variants.
  let JHTV_RELATIONSHIPS = [];
  let REL_BY_VC      = new Map();  // vc.id → relationship entry
  let UNMATCHED_RELS = [];         // relationship firms not yet in vcs.json

  // Find the VC entry whose name or aliases match an externally-written firm name.
  function vcMatchingName(firmName) {
    const fv = jhuNameVariants(firmName);
    return VCS.find(v => {
      const nv = jhuNameVariants(v.name);
      const av = (v.aliases || []).flatMap(jhuNameVariants);
      return fv.some(f => nv.some(x => jhuNamesMatch(x, f, false)) || av.some(x => jhuNamesMatch(x, f, true)));
    });
  }

  function resolveRelationships() {
    REL_BY_VC = new Map();
    UNMATCHED_RELS = [];
    for (const rel of JHTV_RELATIONSHIPS) {
      const vc = vcMatchingName(rel.firm);
      if (vc) { if (!REL_BY_VC.has(vc.id)) REL_BY_VC.set(vc.id, rel); }
      else UNMATCHED_RELS.push(rel);
    }
  }

  function relBadgeHTML(rel) {
    return `<span class="pill rel-badge">${rel.tier || 'JHTV relationship'}</span>`;
  }

  // ── JHTV Investors (revealed co-investment) ──────────────────────────────
  // data/jhtv_investors.json filtered to type ∈ {venture, angel}. INVESTORS_BY_VC
  // joins them to vcs.json via the same vcMatchingName() matcher; BACKERS_BY_COMPANY
  // powers the tech→firm "already invested in this tech" pin.
  let JHTV_INVESTORS      = [];
  let INVESTORS_BY_VC     = new Map();  // vc.id → investor record
  let UNMATCHED_INVESTORS = [];         // backers with no vcs.json entry
  let BACKERS_BY_COMPANY  = new Map();  // normalized company → investor record[]

  function normalizeCompanyKey(name) {
    return (name || '')
      .toLowerCase()
      .replace(/[.,]/g, ' ')
      .replace(/\b(inc|llc|lp|ltd|corp|co|therapeutics|technologies|health|bio|labs)\b/g, ' ')
      .replace(/[^a-z0-9 ]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function resolveInvestors() {
    INVESTORS_BY_VC = new Map();
    UNMATCHED_INVESTORS = [];
    BACKERS_BY_COMPANY = new Map();
    for (const inv of JHTV_INVESTORS) {
      const vc = vcMatchingName(inv.investor);
      if (vc) { if (!INVESTORS_BY_VC.has(vc.id)) INVESTORS_BY_VC.set(vc.id, inv); }
      else UNMATCHED_INVESTORS.push(inv);
      for (const company of inv.companiesBacked || []) {
        const key = normalizeCompanyKey(company);
        if (!key) continue;
        if (!BACKERS_BY_COMPANY.has(key)) BACKERS_BY_COMPANY.set(key, []);
        BACKERS_BY_COMPANY.get(key).push(inv);
      }
    }
  }

  // Backers whose companiesBacked includes this tech (exact-tech "already invested").
  function backersForTech(tech) {
    const keys = new Set([normalizeCompanyKey(tech.name), ...((tech.aliases || []).map(normalizeCompanyKey))]);
    const seen = new Set(), out = [];
    for (const key of keys) {
      if (!key) continue;
      for (const inv of BACKERS_BY_COMPANY.get(key) || []) {
        if (!seen.has(inv.investor)) { seen.add(inv.investor); out.push(inv); }
      }
    }
    return out.sort((a, b) => b.companyCount - a.companyCount);
  }

  // Relationship sort bonus is CAPPED, not stacked: a firm that is both an in-brief
  // pick and a JHTV backer still gets +0.1 total (not +0.2).
  function relationshipBonus(inBrief, isBacker) { return (inBrief || isBacker) ? 0.1 : 0; }

  // ── Search ────────────────────────────────────────────────────────────────
  const input = document.getElementById('vcInput');
  input.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' && _sugItems.length) { e.preventDefault(); highlightSuggest(Math.min(_sugSel + 1, _sugItems.length - 1)); }
    else if (e.key === 'ArrowUp' && _sugItems.length) { e.preventDefault(); highlightSuggest(Math.max(_sugSel - 1, 0)); }
    else if (e.key === 'Escape') closeSuggest();
    else if (e.key === 'Enter') { if (_sugSel >= 0) pickSuggest(_sugSel); else search(); }
  });

  function searchFor(name) {
    input.value = name;
    search();
  }

  // ── Fuzzy matching ────────────────────────────────────────────────────────
  function norm(s) {
    return s.toLowerCase().replace(/[^a-z0-9]/g, '');
  }

  function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length: m + 1}, () => Array(n + 1).fill(0));
    for (let i = 0; i <= m; i++) dp[i][0] = i;
    for (let j = 0; j <= n; j++) dp[0][j] = j;
    for (let i = 1; i <= m; i++)
      for (let j = 1; j <= n; j++)
        dp[i][j] = a[i-1] === b[j-1]
          ? dp[i-1][j-1]
          : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[m][n];
  }

  function bestFuzzyMatch(query) {
    const q = norm(query);
    if (!q || q.length < 2) return null;

    let best = null;
    let bestScore = Infinity;

    for (const vc of VCS) {
      const candidates = [vc.name, ...(vc.aliases || [])];
      for (const c of candidates) {
        const key = norm(c);
        const dist = levenshtein(q, key);
        if (dist < bestScore) { bestScore = dist; best = vc; }
      }
    }

    const threshold = Math.max(2, Math.floor(q.length * 0.4));
    return bestScore <= threshold ? best : null;
  }

  function matchedTechsOf(vc) {
    return (vc.matchedTechs || []).map(id => TECHS.find(t => t.id === id)).filter(Boolean);
  }

  // Rubric v2 (VC→techs, portfolio-led): the firm's best-fit technologies,
  // ranked by vcFitScore over ALL techs — no floor cutoff, so it always returns
  // the top n (never zero) for any VC that carries a stated profile or portfolio.
  // Pure data: the static PDF `matchedTechs` no longer drives this list (it still
  // powers the "In VC brief" badge on the tech→VC side). Deterministic ties:
  // score → shared-domain count → name.
  function topTechsForVC(vc, n = 4) {
    const portfolio = PORTFOLIO_BY_VC.get(vc.id);
    return TECHS
      .map(t => { const fit = vcFitScore(vc, t, portfolio); return fit ? { t, s: fit.score, d: fit.sharedDomains.length } : null; })
      .filter(Boolean)
      .sort((a, b) => b.s - a.s || b.d - a.d || a.t.name.localeCompare(b.t.name))
      .slice(0, n)
      .map(x => x.t);
  }

  function renderVc(vcId, bannerHTML = '') {
    const vc = VCS.find(v => v.id === vcId);
    if (!vc) { renderHome(); return; }
    showResults().innerHTML =
      `<div class="catalog-section">${bannerHTML}${foundHTML(vc, topTechsForVC(vc))}</div>`;
  }

  function renderNotFound(q) {
    showResults().innerHTML = `<div class="catalog-section">${notFoundHTML(q)}</div>`;
  }

  function search() {
    closeSuggest();
    const raw = input.value.trim();
    const q = raw.toLowerCase();

    if (!q) {
      showDomainBrowse();
      return;
    }

    const match = VCS.find(vc =>
      vc.name.toLowerCase().includes(q) ||
      (vc.aliases || []).some(a => a.toLowerCase().includes(q))
    );
    if (match) return navigate('#/vc/' + match.id);

    const tech = TECHS.find(t => t.name.toLowerCase().includes(q));
    if (tech) return navigate('#/tech/' + tech.id);

    const fuzzy = bestFuzzyMatch(raw);
    if (fuzzy) {
      renderVc(fuzzy.id, didYouMeanHTML(fuzzy.name, raw));
      history.replaceState(null, '', '#/vc/' + fuzzy.id);  // shareable; replaceState fires no hashchange
    } else {
      renderNotFound(raw);
    }
  }

  // ── Router ────────────────────────────────────────────────────────────────
  function dispatchRoute() {
    const h = decodeURIComponent(location.hash || '');
    const m = h.match(/^#\/(vc|tech|domain)\/(.+)$/);
    if (m && m[1] === 'vc')     return renderVc(m[2]);
    if (m && m[1] === 'tech')   return renderTech(m[2]);
    if (m && m[1] === 'domain') return renderDomain(m[2]);
    if (h === '#/briefs')       return renderSavedBriefs();
    if (h === '#/all')          return renderAllTechs();
    if (h === '#/grants')       return renderGrantChecker(_grantPrefill);
    renderHome();
  }
  window.addEventListener('hashchange', dispatchRoute);

  // ── Typeahead ─────────────────────────────────────────────────────────────
  let SEARCH_INDEX = [];
  let _sugItems = [];
  let _sugSel   = -1;

  function buildSearchIndex() {
    SEARCH_INDEX = [];
    for (const vc of VCS) SEARCH_INDEX.push({
      type: 'firm', label: vc.name, sub: (vc.stage || []).join(' / '),
      keys: [vc.name, ...(vc.aliases || [])].map(s => s.toLowerCase()),
      go: () => { location.hash = '#/vc/' + vc.id; },
    });
    for (const t of TECHS) SEARCH_INDEX.push({
      type: 'technology', label: t.name, sub: [t.pi, t.stage].filter(Boolean).join(' · '),
      keys: [t.name.toLowerCase()],
      go: () => { location.hash = '#/tech/' + t.id; },
    });
    const seen = new Set();
    for (const c of JHU_CONNECTIONS) {
      const k = c.name + '|' + c.firm;
      if (seen.has(k)) continue;
      seen.add(k);
      SEARCH_INDEX.push({
        type: 'person', label: c.name, sub: c.firm,
        keys: [c.name.toLowerCase()],
        go: () => { goToFirm(c.firm); },
      });
    }
    for (const d of Object.keys(DOMAIN_COLORS)) SEARCH_INDEX.push({
      type: 'domain', label: d, sub: '',
      keys: [d.toLowerCase()],
      go: () => { viewDomain(d); },
    });
    // Precompute word lists once so the per-keystroke loop never splits strings
    for (const e of SEARCH_INDEX) e.words = [...new Set(e.keys.flatMap(jhuTokenize))];
  }

  // Resolve a sheet firm name to the VC whose connection list contains it —
  // the same matching the JHU pills use, so the two can't diverge.
  function goToFirm(firmName) {
    const vc = VCS.find(v => findJHUConnections(v).some(c => c.firm === firmName));
    if (vc) { navigate('#/vc/' + vc.id); return; }
    // Firm not in the database — the JHU matcher is stricter than the
    // whole-string fuzzy in search(), so skip straight to the research offer
    // rather than surfacing a misleading "did you mean" for a known firm name.
    input.value = firmName;
    closeSuggest();
    renderNotFound(firmName);
  }

  const SUGGEST_TYPE_RANK = { firm: 0, technology: 1, domain: 2, person: 3 };

  function querySuggestions(q) {
    q = q.trim().toLowerCase();
    if (q.length < 2) return [];
    const scored = [];
    for (const e of SEARCH_INDEX) {
      let best = 0;
      if (e.keys.some(k => k.startsWith(q))) best = 3;
      else if (e.words.some(w => w.startsWith(q))) best = 2;
      else if (e.keys.some(k => k.includes(q))) best = 1;
      if (best > 0) scored.push({ e, s: best });
    }
    scored.sort((a, b) => b.s - a.s || SUGGEST_TYPE_RANK[a.e.type] - SUGGEST_TYPE_RANK[b.e.type] || a.e.label.localeCompare(b.e.label));
    return scored.slice(0, 8).map(x => x.e);
  }

  function renderSuggest(items) {
    if (!items.length) return closeSuggest();
    _sugItems = items;
    _sugSel = -1;
    const box = document.getElementById('searchSuggest');
    box.innerHTML = items.map((e, i) => `
      <div class="suggest-row" role="option" aria-selected="false"
           onmousedown="event.preventDefault();pickSuggest(${i})">
        <span class="suggest-type suggest-type-${e.type}">${e.type}</span>
        <span class="suggest-label">${e.label}</span>
        ${e.sub ? `<span class="suggest-sub">${e.sub}</span>` : ''}
      </div>`).join('');
    box.style.display = 'block';
  }

  function highlightSuggest(i) {
    _sugSel = i;
    [...document.getElementById('searchSuggest').children].forEach((el, j) => {
      el.classList.toggle('sel', j === i);
      el.setAttribute('aria-selected', j === i);
    });
  }

  function pickSuggest(i) {
    const item = _sugItems[i];
    if (!item) return;
    input.value = item.label;
    closeSuggest();
    item.go();
  }

  function closeSuggest() {
    const box = document.getElementById('searchSuggest');
    box.style.display = 'none';
    box.innerHTML = '';
    _sugItems = [];
    _sugSel = -1;
  }

  input.addEventListener('input', () => renderSuggest(querySuggestions(input.value)));
  input.addEventListener('blur', () => setTimeout(closeSuggest, 150));

  // ── Render helpers ────────────────────────────────────────────────────────
  function matchReason(vc, tech) {
    const STAGE_COMPAT = {
      'Pre-Seed':   ['NewCo', 'Pre-Seed', 'Seed'],
      'Seed':       ['NewCo', 'Pre-Seed', 'Seed'],
      'Series A':   ['Seed', 'Series A'],
      'Series B':   ['Series A', 'Series B'],
      'Series C':   ['Series B', 'Series C', 'Growth'],
      'Growth':     ['Series B', 'Series C', 'Growth', 'Commercial'],
      'Late Stage': ['Series B', 'Growth', 'Commercial'],
    };
    const shared = (tech.sectors || []).filter(s => (vc.sectors || []).includes(s));
    const stageOk = (vc.stage || []).some(vs => (STAGE_COMPAT[vs] || []).includes(tech.stage));
    if (!shared.length && !stageOk) return null;

    const vcStageStr  = (vc.stage || []).join('/') || null;
    const sectorStr   = shared.length ? shared.join(' & ') : null;
    let sentence1, sentence2;

    if (sectorStr && stageOk) {
      sentence1 = `${vc.name} invests in ${sectorStr} companies${vcStageStr ? ` at the ${vcStageStr} stage` : ''}.`;
      sentence2 = `This technology's ${tech.stage ? tech.stage + ' ' : ''}${sectorStr} profile is a direct fit with their portfolio focus.`;
    } else if (sectorStr) {
      sentence1 = `${vc.name} has a strong ${sectorStr} investment focus.`;
      sentence2 = `This technology's ${sectorStr} domain aligns with their thesis, though the financing stage may differ.`;
    } else {
      sentence1 = `${vc.name} targets ${vcStageStr ? vcStageStr + ' stage' : ''} investments.`;
      sentence2 = `This technology is at the ${tech.stage} stage, which falls within their investment range.`;
    }

    return `${sentence1} ${sentence2}`;
  }

  function foundHTML(vc, techs) {
    window[`_vcTechs_${vc.id}`] = techs;

    const stagePills  = (vc.stage   || []).map(s => `<span class="pill">${s}</span>`).join('');
    const sectorPills = (vc.sectors || []).map(s => `<span class="pill">${s}</span>`).join('');

    const vcBriefBtn = vc.vcOnePager
      ? `<button class="btn btn-secondary" onclick="previewVC('${vc.vcOnePager}')">Preview VC Brief</button>
         <button class="btn btn-gold" onclick="downloadVC('${vc.vcOnePager}')">Download PDF</button>`
      : '';

    const downloadAllBtn = techs.length > 1
      ? `<button class="btn btn-secondary" onclick="downloadAllTech(${JSON.stringify(techs.map(t => t.onePager)).replace(/"/g, '&quot;')})">
           Download All Tech One-Pagers (${techs.length})
         </button>`
      : '';

    const provisionalBanner = vc.provisional
      ? `<div class="provisional-banner">Provisional profile — generated from public web data only, no Pitchbook. Review before using in outreach.</div>`
      : '';

    const jhuMatches = findJHUConnections(vc);
    const jhuSection = jhuMatches.length
      ? `<p class="section-label">${jhuMatches.length} JHU connection${jhuMatches.length === 1 ? '' : 's'} at ${vc.name}</p>
         <div class="jhu-connections-grid">${jhuMatches.map(c => `
           <div class="jhu-connection-card">
             <div class="jhu-card-top">
               <div class="jhu-card-name">${c.name}</div>
               ${c.entityType ? `<span class="jhu-entity-pill">${c.entityType}</span>` : ''}
             </div>
             ${c.role ? `<div class="jhu-card-role">${c.role}</div>` : ''}
             ${jhuTokenize(c.firm).join(' ') !== jhuTokenize(vc.name).join(' ') ? `<div class="jhu-card-firm">Listed as: ${c.firm}</div>` : ''}
             ${c.connection ? `<div class="jhu-card-connection"><span class="jhu-badge">JHU</span><span>${c.connection}</span></div>` : ''}
           </div>`).join('')}
         </div>`
      : `<p class="jhu-no-connections">No JHU connections found for ${vc.name} in the network database.</p>`;

    return `
      ${provisionalBanner}
      <div class="vc-header">
        <div>
          <h2>${vc.name}</h2>
          <div class="vc-meta">${sectorPills}${stagePills}</div>
          ${REL_BY_VC.has(vc.id) ? `<div class="rel-line">${relBadgeHTML(REL_BY_VC.get(vc.id))}${REL_BY_VC.get(vc.id).note ? `<span class="rel-note">${REL_BY_VC.get(vc.id).note}</span>` : ''}</div>` : ''}
        </div>
        <div class="vc-actions">
          ${vcBriefBtn}
          ${downloadAllBtn}
        </div>
      </div>
      ${jhuSection}
      <p class="section-label">${techs.length} matched technolog${techs.length === 1 ? 'y' : 'ies'}</p>
      <div class="tech-grid">${techs.map(t => techCardHTML(t, null, matchReason(vc, t))).join('')}</div>
    `;
  }

  function techCardHTML(t, accentColor, reason) {
    const tags        = (t.sectors || []).map(s => {
      const c = accentColor || DOMAIN_COLORS[s] || '#64748B';
      return `<span class="pill"><span class="pill-dot" style="background:${c}"></span>${s}</span>`;
    }).join('');
    const downloadBtn = t.onePager
      ? `<button class="btn btn-secondary btn-sm" onclick="viewTech('${t.id}')">Funding Profile</button>
         <button class="btn btn-secondary btn-sm" onclick="previewTech('${t.onePager}')">Preview</button>
         <button class="btn btn-primary btn-sm" onclick="downloadTech('${t.onePager}')">Download</button>`
      : `<button class="btn btn-secondary btn-sm" onclick="viewTech('${t.id}')">Funding Profile</button>`;
    const topBorder = accentColor ? `border-top:3px solid ${accentColor}` : '';

    return `
      <div class="tech-card" style="${topBorder}">
        <h3 class="tech-card-title" onclick="viewTech('${t.id}')" title="View funding profile">${t.name}</h3>
        ${t.pi          ? `<p class="pi">${t.pi}</p>` : ''}
        ${reason        ? `<p class="match-reason">${reason}</p>` : ''}
        ${t.description ? `<p class="desc">${t.description}</p>` : ''}
        <div class="tags">${tags}${t.stage ? `<span class="pill">${t.stage}</span>` : ''}</div>
        <div class="actions">${downloadBtn}</div>
      </div>
    `;
  }

  function didYouMeanHTML(name, originalQuery) {
    const safe = (originalQuery || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    return `<div class="did-you-mean">Did you mean <strong>${name}</strong>? <a href="#" style="margin-left:12px;font-size:.85em;font-weight:400;color:var(--muted);text-decoration:underline" onclick="event.preventDefault();triggerResearch('${safe}')">No, research &ldquo;${originalQuery}&rdquo; instead</a></div>`;
  }

  async function triggerResearch(vcName) {
    showResults().innerHTML = `<div class="catalog-section"><div class="not-found">
      <h2>Researching ${vcName}…</h2>
      <p id="research-status" style="color:var(--muted);font-size:.88rem">Starting research server… (first use may take up to 30s)</p>
    </div></div>`;

    try {
      const postRes = await fetch(RESEARCH_SERVER + '/api/research-vc', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ vcName }),
      });
      const postData = await postRes.json();
      if (!postRes.ok) throw new Error(postData.error || 'Server error ' + postRes.status);

      document.getElementById('research-status').textContent = 'Researching ' + vcName + '… ⏳';

      const entry = await pollJob(postData.jobId);

      const idx = VCS.findIndex(v => v.id === entry.id);
      if (idx >= 0) VCS[idx] = entry; else VCS.push(entry);
      document.getElementById('vcInput').value = entry.name;
      search();

    } catch (err) {
      const s = document.getElementById('research-status');
      if (s) { s.style.color = '#DC2626'; s.textContent = 'Research failed: ' + err.message + ' — try again.'; }
    }
  }

  function pollJob(jobId) {
    return new Promise((resolve, reject) => {
      const iv = setInterval(async () => {
        try {
          const res = await fetch(RESEARCH_SERVER + '/api/job/' + jobId);
          const job = await res.json();
          if (job.status === 'done')  { clearInterval(iv); resolve(job.result); }
          if (job.status === 'error') { clearInterval(iv); reject(new Error(job.error || 'Research failed')); }
        } catch (e) { clearInterval(iv); reject(e); }
      }, 3000);
    });
  }

  function notFoundHTML(q) {
    const safe = q.replace(/"/g, '&quot;');
    return `
      <div class="not-found">
        <h2>No match for &ldquo;${q}&rdquo;</h2>
        <p>No firm, technology, or JHU contact by that name is in the database. If ${q} is a VC firm, you can generate a provisional profile and matched technology one-pagers.</p>
        <div id="research-cmd-anchor">
          <button class="btn btn-primary" onclick="triggerResearch('${safe}')">Research &ldquo;${safe}&rdquo; as a new VC firm &rarr;</button>
        </div>
        <p style="margin-top:16px;font-size:.8rem;color:var(--muted)">Provisional profiles use public web data only (no Pitchbook). Review before using in outreach.</p>
      </div>
    `;
  }

  // ── Tech Funding Profile ──────────────────────────────────────────────────
  // Reverse view: for one technology, show best-fit VCs (with JHU warm intros)
  // and a preliminary grant screen powered by the Grant Finder's shared engine.
  const GRANT_FINDER_URL = 'https://ckannam.github.io/jhtv-grant-finder';

  // One ranked list. "In VC brief" (hand-reviewed PDF match) earns a badge and
  // a +0.1 sort bonus; provisional firms' matchedTechs came from this same
  // scoring, so they get neither. Firms without profile data can only surface
  // via their brief match (fixed 0.75 sort score).
  function findVCsForTech(tech) {
    const rows = [];
    for (const vc of VCS) {
      const briefMatch = (vc.matchedTechs || []).includes(tech.id);
      const inBrief = !!vc.vcOnePager && briefMatch;
      const fit = vcFitScore(vc, tech, PORTFOLIO_BY_VC.get(vc.id));
      if (fit) {
        if (fit.score >= 0.45 || inBrief)
          rows.push({ vc, fit, inBrief, sortScore: fit.score + (inBrief ? 0.1 : 0) });
      } else if (briefMatch) {
        rows.push({ vc, fit: null, inBrief, sortScore: 0.75 });
      }
    }
    return rows.sort((a, b) => b.sortScore - a.sortScore);
  }

  function toggleMoreFits() {
    const more = document.getElementById('moreVcFits');
    const btn  = document.getElementById('moreVcFitsBtn');
    const hidden = more.style.display === 'none';
    more.style.display = hidden ? '' : 'none';
    btn.textContent = hidden ? 'Show fewer matches' : btn.dataset.showLabel;
  }

  function vcFitRowHTML(vc, badge, detail) {
    const jhu = findJHUConnections(vc);
    const jhuPill = jhu.length
      ? `<span class="jhu-count-pill">${jhu.length} JHU connection${jhu.length === 1 ? '' : 's'}</span>`
      : `<span class="jhu-count-pill none">No JHU connections</span>`;
    return `
      <div class="vc-fit-row">
        <div class="vc-fit-main">
          <a href="#" class="vc-fit-name" onclick="event.preventDefault();searchFor('${vc.name.replace(/'/g, "\\'")}')">${vc.name}</a>
          ${badge}
          ${jhuPill}
        </div>
        ${detail ? `<div class="vc-fit-detail">${detail}</div>` : ''}
      </div>`;
  }

  // ── Grant engine (shared with the Grant Finder site, same GitHub Pages origin)
  let _grantEngine = null;
  let _grantsLive  = null;

  async function loadGrantEngine() {
    if (_grantEngine) return _grantEngine;
    const [src, live] = await Promise.all([
      fetch(GRANT_FINDER_URL + '/grant_engine.js').then(r => {
        if (!r.ok) throw new Error('grant engine HTTP ' + r.status);
        return r.text();
      }),
      fetch(GRANT_FINDER_URL + '/grants_live.json').then(r => r.ok ? r.json() : null).catch(() => null),
    ]);
    // The deployed engine reliably exports getGrants; applyLiveData exists only
    // in newer (not-yet-deployed) engine builds, so guard it — callers fall back
    // to the local overlayLive when it's null.
    _grantEngine = new Function(src + '; return { getGrants, applyLiveData: (typeof applyLiveData !== "undefined" ? applyLiveData : null) };')();
    _grantsLive  = (live && live.grants) || {};
    return _grantEngine;
  }

  // Map a tech record onto the Grant Finder's form fields. Only fields a tech
  // record can honestly answer; founder-specific fields stay blank.
  function techToGrantInput(tech) {
    const SECTOR_TO_TYPE = {
      'Therapeutics': 'therapeutic', 'Medical Devices': 'device', 'Diagnostics': 'device',
      'Digital Health': 'digital_health', 'Research Technologies': 'life_tools',
      'Agricultural Tech': 'synbio', 'Clean Tech': 'non_medical', 'Cybersecurity': 'non_medical',
    };
    const s = (tech.stage || '').toLowerCase();
    let ventureStage = 'forming';
    if (s.includes('pre-seed') || s.includes('pre-clinical')) ventureStage = 'pre_seed';
    else if (s.includes('seed')) ventureStage = 'seed';
    else if (s.includes('series') || s.includes('growth') || s.includes('commercial')) ventureStage = 'growth';
    return {
      ventureStage,
      technologyType: SECTOR_TO_TYPE[(tech.sectors || [])[0]] || 'non_medical',
      jhtv: 'yes',              // every catalog tech is a JHTV disclosure
      jhuSchool: 'other_jhu',   // JHU affiliation is a given for portfolio techs
    };
  }

  function grantDeepLink(d) {
    const params = new URLSearchParams(d);
    params.set('stage', ['forming', 'pre_seed'].includes(d.ventureStage) ? 'pre_co' : 'co');
    return `${GRANT_FINDER_URL}/jhtv_grant_eligibility.html#${params.toString()}`;
  }

  async function renderTechGrants(tech) {
    const box = document.getElementById('techGrantSection');
    if (!box) return;
    try {
      const { getGrants, applyLiveData } = await loadGrantEngine();
      const apply = applyLiveData || overlayLive;
      const d = techToGrantInput(tech);
      const results = getGrants(d).map(g => apply(g, _grantsLive));
      const eligible    = results.filter(g => g.s === 'eligible');
      const conditional = results.filter(g => g.s === 'conditional');
      const ineligible  = results.filter(g => g.s === 'ineligible');
      const link = grantDeepLink(d);

      const rows = [...eligible, ...conditional].map(g => `
        <div class="grant-row">
          <span class="grant-status ${g.s}"></span>
          <div class="grant-row-main">
            <a class="grant-row-title" href="${link}" target="_blank" rel="noopener">${g.title}</a>
            <div class="grant-row-meta">${g.org} · ${g.amount}${g.deadline ? ` · ${g.deadline}` : ''}</div>
          </div>
          <span class="pill grant-pill-${g.s}">${g.s === 'eligible' ? 'Likely eligible' : 'Conditional'}</span>
        </div>`).join('');

      box.innerHTML = `
        <p class="section-label">Non-dilutive funding — preliminary screen</p>
        <p class="grant-disclaimer">Based on stage and technology type only; founder-specific factors (Maryland presence, entity, team, SBIR history) are unchecked. ${ineligible.length} programs screened out.</p>
        <div class="grant-rows">${rows || '<p class="jhu-no-connections">No likely-eligible grants at this stage.</p>'}</div>
        <button class="btn btn-secondary btn-sm" style="margin-top:10px" onclick="refineGrantsForTech('${tech.id}')">Refine eligibility →</button>
      <a class="grant-external-link" href="${link}" target="_blank" rel="noopener">Open in Grant Finder ↗</a>`;
    } catch (err) {
      box.innerHTML = `
        <p class="section-label">Non-dilutive funding — preliminary screen</p>
        <p class="jhu-no-connections">Couldn't reach the Grant Finder (${err.message}). <a href="${GRANT_FINDER_URL}" target="_blank" rel="noopener">Open it directly</a>.</p>`;
    }
  }

  function viewTech(techId) { location.hash = '#/tech/' + techId; }

  function renderTech(techId) {
    const tech = TECHS.find(t => t.id === techId);
    if (!tech) { renderHome(); return; }

    const picks = findVCsForTech(tech);
    const fitRowHTML = ({ vc, fit, inBrief }) => {
      const rel = REL_BY_VC.get(vc.id);
      const badges = [];
      if (rel) badges.push(relBadgeHTML(rel));
      if (inBrief) badges.push('<span class="pill fit-badge-curated">In VC brief</span>');
      if (fit) {
        const t = fitTier(fit.score);
        badges.push(`<span class="pill fit-tier-${t.cls}">${t.label}</span>`);
      }
      const parts = [];
      if (fit && fit.portfolioHits) parts.push(`has ${fit.portfolioHits} portfolio compan${fit.portfolioHits === 1 ? 'y' : 'ies'} like this`);
      if (fit && fit.sharedDomains.length) parts.push(`invests in ${fit.sharedDomains.join(' & ')}`);
      if (fit && fit.stageOk) parts.push(`backs ${tech.stage || 'this'}-stage companies`);
      const detail = [parts.length ? `${vc.name.split(' ')[0]} ${parts.join(' and ')}.` : '', rel && rel.note ? rel.note : '']
        .filter(Boolean).join(' · ');
      return vcFitRowHTML(vc, badges.join(''), detail);
    };

    const rels      = picks.filter(p => REL_BY_VC.has(p.vc.id));
    const prospects = picks.filter(p => !REL_BY_VC.has(p.vc.id));

    const relChips = UNMATCHED_RELS.map(rl =>
      `<button class="rel-chip" onclick="triggerResearch('${rl.firm.replace(/'/g, "\\'")}')" title="Not yet profiled — research this firm">${rl.firm}</button>`).join('');
    const relSection = (rels.length || relChips) ? `
        <p class="section-label">JHTV relationships — ${rels.length} profiled firm${rels.length === 1 ? '' : 's'}</p>
        <div class="vc-fit-list">
          ${rels.map(fitRowHTML).join('')}
          ${relChips ? `<div class="rel-strip"><span>In the relationship network, not yet profiled:</span>${relChips}</div>` : ''}
        </div>` : '';

    const prospectLabel = relSection ? 'New prospects' : 'Investor fit';
    const firstRows = prospects.slice(0, 4).map(fitRowHTML).join('');
    const moreRows  = prospects.slice(4).map(fitRowHTML).join('');

    const sectorPills = (tech.sectors || []).map(s => {
      const c = DOMAIN_COLORS[s] || '#64748B';
      return `<span class="pill"><span class="pill-dot" style="background:${c}"></span>${s}</span>`;
    }).join('');

    const fileBtns = tech.onePager
      ? `<button class="btn btn-secondary" onclick="previewTech('${tech.onePager}')">Preview One-Pager</button>
         <button class="btn btn-primary" onclick="downloadTech('${tech.onePager}')">Download</button>`
      : '';

    showResults().innerHTML = `
      <div class="catalog-section">
        <div class="catalog-header">
          <h2>Funding profile</h2>
          <button class="view-all-link" onclick="showDomainBrowse()">← Back to catalog</button>
        </div>
        <div class="vc-header">
          <div>
            <h2>${tech.name}</h2>
            ${tech.pi ? `<p class="pi" style="margin:4px 0 8px">${tech.pi}</p>` : ''}
            <div class="vc-meta">${sectorPills}${tech.stage ? `<span class="pill">${tech.stage}</span>` : ''}</div>
          </div>
          <div class="vc-actions">${fileBtns}</div>
        </div>
        ${tech.description ? `<p class="tech-profile-desc">${tech.description}</p>` : ''}

        ${relSection}
        <p class="section-label">${prospectLabel} — ${prospects.length} firm${prospects.length === 1 ? '' : 's'}</p>
        <div class="vc-fit-list">
          ${firstRows || '<p class="jhu-no-connections">No researched VC in the database fits this technology yet — try researching a firm from the search bar.</p>'}
          ${moreRows ? `<div id="moreVcFits" style="display:none">${moreRows}</div>
            <button class="btn btn-secondary btn-sm" id="moreVcFitsBtn" data-show-label="Show ${prospects.length - 4} more match${prospects.length - 4 === 1 ? '' : 'es'}" onclick="toggleMoreFits()">Show ${prospects.length - 4} more match${prospects.length - 4 === 1 ? '' : 'es'}</button>` : ''}
        </div>

        <div id="techGrantSection" class="profile-section"><p class="section-label">Non-dilutive funding — preliminary screen</p><p class="grant-disclaimer">Checking grant eligibility…</p></div>

      </div>`;

    renderTechGrants(tech);
    window.scrollTo({ top: 0 });
  }

  // ── Preview ───────────────────────────────────────────────────────────────
  let _previewFile = null;
  let _previewType = null;

  function previewTech(filename) {
    _previewFile = filename;
    _previewType = 'tech';
    const title = filename.replace(/\.[^.]+$/, '');
    const frame = document.getElementById('previewFrame');
    const fallback = document.getElementById('previewFallback');

    document.getElementById('previewTitle').textContent = title;
    frame.src = '';
    fallback.style.display = 'none';

    if (filename.toLowerCase().endsWith('.docx')) {
      if (location.hostname.includes('github.io')) {
        const base = 'https://ckannam.github.io/VC_Matching_Second_Brain/';
        const encodedPath = 'one-pagers/Tech%20One%20Pagers/' + encodeURIComponent(filename);
        frame.src = 'https://view.officeapps.live.com/op/embed.aspx?src=' + encodeURIComponent(base + encodedPath);
      } else {
        fallback.style.display = 'flex';
      }
    } else {
      frame.src = `one-pagers/Tech One Pagers/${filename}`;
    }
    _openPreviewModal();
  }

  function previewVC(filename) {
    _previewFile = filename;
    _previewType = 'vc';
    const title = filename.replace(/\.[^.]+$/, '');

    document.getElementById('previewTitle').textContent = title;
    document.getElementById('previewFallback').style.display = 'none';
    document.getElementById('previewFrame').src = `one-pagers/VC One Pagers/Completed One Pagers /${filename}`;
    _openPreviewModal();
  }

  function _openPreviewModal() {
    document.getElementById('previewModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closePreview() {
    document.getElementById('previewModal').classList.remove('open');
    document.getElementById('previewFrame').src = '';
    document.body.style.overflow = '';
    _previewFile = null;
    _previewType = null;
  }

  function downloadCurrentPreview() {
    if (!_previewFile) return;
    if (_previewType === 'tech') downloadTech(_previewFile);
    else downloadVC(_previewFile);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePreview(); });

  // ── Downloads ─────────────────────────────────────────────────────────────
  function downloadFile(href, filename) {
    const a = document.createElement('a');
    a.href     = href;
    a.download = filename;
    a.click();
  }

  function downloadTech(filename) {
    downloadFile(`one-pagers/Tech One Pagers/${filename}`, filename);
  }

  function downloadVC(filename) {
    downloadFile(`one-pagers/VC One Pagers/Completed One Pagers /${filename}`, filename);
  }

  function downloadAllTech(filenames) {
    filenames.forEach((filename, i) => {
      setTimeout(() => downloadTech(filename), i * 800);
    });
  }

  // ── One-Pager Generator ───────────────────────────────────────────────────
  function generateOnePager(vc, techs) {
    if (!vc) return;
    const matchedTechs = (techs || []).slice(0, 4);

    // Helpers
    const PB = `<span style="color:#aaa;font-style:italic;font-size:10px;">*</span>`;
    const pbVal = (text) => `<span style="color:#999;font-style:italic;">${text}</span>${PB}`;
    const sectionLabel = (text) =>
      `<div style="font-size:9px;font-weight:700;letter-spacing:1.2px;color:#003B6F;border-bottom:2px solid #003B6F;padding-bottom:3px;margin-bottom:7px;text-transform:uppercase;">${text}</div>`;

    // Stage focus label for stats row
    const stages = vc.stage || [];
    const stageFocusLabel = stages.length > 1
      ? `${stages[0]} → ${stages[stages.length - 1]}`
      : stages[0] || '—';

    // Sector pills
    const sectorPills = (vc.sectors || []).slice(0, 3).map(s => {
      const color = DOMAIN_COLORS[s] || '#003B6F';
      return `<span style="background:${color};color:#fff;padding:3px 9px;border-radius:3px;font-size:10px;font-weight:600;margin:2px 3px 2px 0;display:inline-block;">${s}</span>`;
    }).join('');

    // Thesis bullets — split on ". " to get sentences
    const thesisBullets = (() => {
      if (!vc.focus) return '<li style="color:#999;font-style:italic;">—</li>';
      const sentences = vc.focus.split(/\.\s+/).filter(s => s.trim().length > 10);
      if (sentences.length <= 1) return `<li>${vc.focus}</li>`;
      return sentences.map(s => `<li style="margin-bottom:3px;">${s.replace(/\.+$/, '')}.</li>`).join('');
    })();

    // JHTV tech match cards (2×2 grid)
    const techCardHTML = (tech) => {
      const color = DOMAIN_COLORS[(tech.sectors || [])[0]] || '#003B6F';
      return `<div style="border:1px solid #e0e0e0;border-top:3px solid ${color};padding:9px;font-size:10px;">
        <div style="font-weight:700;font-size:11px;margin-bottom:3px;color:#111;">${tech.name}</div>
        ${tech.pi ? `<div style="color:#777;margin-bottom:4px;font-size:10px;">PI: ${tech.pi}</div>` : ''}
        <div style="line-height:1.4;color:#333;">${tech.description || ''}</div>
      </div>`;
    };
    const techGrid = matchedTechs.length
      ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">${matchedTechs.map(techCardHTML).join('')}</div>`
      : `<div style="color:#999;font-style:italic;font-size:11px;">No matched technologies found.</div>`;

    // Last 10 investments placeholder rows
    const investmentRows = Array.from({length: 10}, (_, i) =>
      `<tr style="border-bottom:1px solid #eee;">
        <td style="padding:4px 6px;color:#bbb;font-style:italic;font-size:10px;">—*</td>
        <td style="padding:4px 6px;color:#bbb;font-style:italic;font-size:10px;">—*</td>
        <td style="padding:4px 6px;color:#bbb;font-style:italic;font-size:10px;">—*</td>
        <td style="padding:4px 6px;color:#bbb;font-style:italic;font-size:10px;">Pull from PitchBook</td>
      </tr>`
    ).join('');

    const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>${vc.name} — JHTV Investor Brief</title>
<style>
  @page { size: letter portrait; margin: 0.45in 0.45in; }
  * { box-sizing: border-box; font-family: Arial, sans-serif; margin: 0; padding: 0; }
  body { font-size: 11px; color: #222; background: #fff; }
  .print-btn { padding: 10px 0; }
  @media print { .print-btn { display: none; } }
</style>
</head>
<body>

<div class="print-btn">
  <button onclick="window.print()" style="background:#003B6F;color:#fff;border:none;padding:7px 18px;cursor:pointer;border-radius:4px;font-size:12px;">Print / Save as PDF</button>
</div>

<!-- HEADER -->
<div style="background:#003B6F;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start;">
  <div>
    <div style="font-size:22px;font-weight:700;letter-spacing:0.5px;">${vc.name.toUpperCase()}</div>
    <div style="font-size:10px;opacity:0.8;margin-top:3px;">Investor One-Pager | Prepared for JHTV${vc.geographicFocus ? ' · ' + vc.geographicFocus : ''}</div>
  </div>
  <div style="text-align:right;font-size:10px;opacity:0.8;line-height:1.6;">
    <div style="font-weight:600;">Fund — *</div>
    <div>AUM Undisclosed *</div>
    <div>Close — *</div>
    <div>Dry Powder Undisclosed *</div>
  </div>
</div>

<!-- AUTO-GENERATED BANNER -->
<div style="background:#C8973A;color:#fff;padding:5px 16px;font-size:10px;font-weight:600;">

</div>

<!-- STATS ROW -->
<div style="display:flex;background:#EFF6FF;border-bottom:1px solid #dbeafe;">
  <div style="flex:1;padding:10px 16px;text-align:center;border-right:1px solid #dbeafe;">
    <div style="font-size:20px;font-weight:700;color:#003B6F;">${pbVal('—')}</div>
    <div style="font-size:9px;color:#555;margin-top:2px;letter-spacing:0.5px;">ACTIVE PORTFOLIO COMPANIES</div>
  </div>
  <div style="flex:1;padding:10px 16px;text-align:center;border-right:1px solid #dbeafe;">
    <div style="font-size:14px;font-weight:700;color:#003B6F;">${stageFocusLabel}</div>
    <div style="font-size:9px;color:#555;margin-top:2px;letter-spacing:0.5px;">STAGE FOCUS</div>
  </div>
  <div style="flex:1;padding:10px 16px;text-align:center;">
    <div style="font-size:20px;font-weight:700;color:#003B6F;">${pbVal('—')}</div>
    <div style="font-size:9px;color:#555;margin-top:2px;letter-spacing:0.5px;">INVESTMENTS TTM (PITCHBOOK)</div>
  </div>
</div>

<!-- HOPKINS BOX -->
<div style="background:#FEF9EC;border-left:4px solid #C8973A;padding:7px 16px;font-size:10px;color:#555;">
  <strong style="color:#92600A;">Hopkins Connection:</strong>
  Hopkins connection not researched — verify in PitchBook for JHU alumni GPs or portfolio co-founders before meeting.
</div>

<!-- TWO-COLUMN BODY -->
<div style="display:flex;gap:0;padding:12px 16px;gap:16px;">

  <!-- LEFT COLUMN -->
  <div style="flex:1;min-width:0;">

    <!-- FIRM OVERVIEW -->
    ${sectionLabel('Firm Overview')}
    <table style="width:100%;font-size:10px;border-collapse:collapse;margin-bottom:14px;">
      <tr><td style="color:#003B6F;font-weight:600;padding:3px 8px 3px 0;white-space:nowrap;width:80px;">Founded</td><td style="padding:3px 0;">${pbVal('—')}</td></tr>
      <tr><td style="color:#003B6F;font-weight:600;padding:3px 8px 3px 0;">HQ</td><td style="padding:3px 0;">${pbVal('—')}</td></tr>
      <tr><td style="color:#003B6F;font-weight:600;padding:3px 8px 3px 0;">AUM</td><td style="padding:3px 0;">${pbVal('Undisclosed')}</td></tr>
      <tr><td style="color:#003B6F;font-weight:600;padding:3px 8px 3px 0;white-space:nowrap;">Dry Powder</td><td style="padding:3px 0;">${pbVal('Undisclosed')}</td></tr>
      <tr><td style="color:#003B6F;font-weight:600;padding:3px 8px 3px 0;white-space:nowrap;">Fund Close</td><td style="padding:3px 0;">${pbVal('—')}</td></tr>
      <tr>
        <td style="color:#003B6F;font-weight:600;padding:3px 8px 3px 0;vertical-align:top;">Stage</td>
        <td style="padding:3px 0;">
          ${stages.join(', ') || '—'}<br>
          <span style="color:#999;font-style:italic;font-size:10px;">Stage % — pull from PitchBook *</span>
        </td>
      </tr>
      ${vc.checkSize ? `<tr><td style="color:#003B6F;font-weight:600;padding:3px 8px 3px 0;white-space:nowrap;">Check Size</td><td style="padding:3px 0;">$${vc.checkSize.min}M – $${vc.checkSize.max}M</td></tr>` : ''}
      ${vc.geographicFocus ? `<tr><td style="color:#003B6F;font-weight:600;padding:3px 8px 3px 0;">Geography</td><td style="padding:3px 0;">${vc.geographicFocus}</td></tr>` : ''}
    </table>

    <!-- LAST 10 INVESTMENTS -->
    ${sectionLabel('Last 10 Investments')}
    <table style="width:100%;font-size:10px;border-collapse:collapse;">
      <thead>
        <tr style="background:#003B6F;color:#fff;">
          <th style="padding:5px 6px;text-align:left;font-weight:600;">Company</th>
          <th style="padding:5px 6px;text-align:left;font-weight:600;">Sector</th>
          <th style="padding:5px 6px;text-align:left;font-weight:600;">Note</th>
          <th style="padding:5px 6px;text-align:left;font-weight:600;">Description</th>
        </tr>

    </table>
    <div style="font-size:9px;color:#aaa;font-style:italic;margin-top:4px;">* Pull last 10 investments from PitchBook before meeting</div>

  </div>

  <!-- RIGHT COLUMN -->
  <div style="flex:1;min-width:0;">

    <!-- SECTOR FOCUS -->

    <ul style="font-size:10px;line-height:1.5;color:#333;padding-left:14px;margin-bottom:14px;">${thesisBullets}</ul>

    ${techGrid}

  </div>
</div>

    const newTab = window.open('', '_blank');
    newTab.document.write(html);

  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadData();
