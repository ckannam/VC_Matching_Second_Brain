<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JHTV Second Brain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>JHTV Second Brain</h1>
  <span>VC–Technology Matching Tool</span>
</header>

<main class="container">

  <div class="search-card">
    <label for="vcInput">Enter a VC firm name</label>
    <div class="search-row">
      <input type="text" id="vcInput" placeholder="e.g. Blueprint Health, Andreessen Horowitz..." autocomplete="off">
      <button class="btn btn-primary" onclick="search()">Search</button>
    </div>
  </div>

  <div id="results"></div>

  <div id="emptyState" class="empty-state">
    Search a VC above to see matched JHTV technology one-pagers.
  </div>

</main>

<script>
  const input   = document.getElementById('vcInput');
  const results = document.getElementById('results');
  const empty   = document.getElementById('emptyState');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

  async function search() {
    const q = input.value.trim();
    if (!q) return;

    results.style.display = 'none';
    empty.style.display   = 'none';
    results.innerHTML     = '';

    const res  = await fetch(`/api/search?vc=${encodeURIComponent(q)}`);
    const data = await res.json();

    results.style.display = 'block';

    if (!data.found) {
      results.innerHTML = notFoundHTML(q);
      return;
    }

    results.innerHTML = foundHTML(data.vc, data.technologies);
  }

  function foundHTML(vc, techs) {
    const stagePills = (vc.stage || []).map(s => `<span class="pill">${s}</span>`).join('');
    const sectorPills = (vc.sectors || []).map(s => `<span class="pill">${s}</span>`).join('');

    const downloadAllBtn = techs.length > 1
      ? `<button class="btn btn-gold" onclick="downloadAll(${JSON.stringify(techs.map(t => t.id))})">
           Download All (${techs.length} PDFs)
         </button>`
      : '';

    const cards = techs.map(t => techCardHTML(t)).join('');

    return `
      <div class="vc-header">
        <div>
          <h2>${vc.name}</h2>
          <div class="vc-meta">${sectorPills}${stagePills}</div>
        </div>
        ${downloadAllBtn}
      </div>
      <p class="section-label">${techs.length} matched technolog${techs.length === 1 ? 'y' : 'ies'}</p>
      <div class="tech-grid">${cards}</div>
    `;
  }

  function techCardHTML(t) {
    const tags = (t.sectors || []).map(s => `<span class="pill">${s}</span>`).join('');
    return `
      <div class="tech-card">
        <h3>${t.name}</h3>
        ${t.pi ? `<p class="pi">${t.pi}</p>` : ''}
        ${t.description ? `<p style="font-size:.85rem;color:#444;">${t.description}</p>` : ''}
        <div class="tags">${tags}${t.stage ? `<span class="pill">${t.stage}</span>` : ''}</div>
        <div class="actions">
          <button class="btn btn-primary btn-sm" onclick="downloadOne('${t.id}')">
            Download PDF
          </button>
        </div>
      </div>
    `;
  }

  function notFoundHTML(q) {
    return `
      <div class="not-found">
        <h2>No results for "${q}"</h2>
        <p>This VC isn't in the database yet. Add them to <code>data/vcs.json</code>
           or use the AI generator below once it's available.</p>
        <button class="btn btn-primary" disabled title="Coming soon">
          Generate VC Profile with AI
        </button>
      </div>
    `;
  }

  function downloadOne(techId) {
    window.location.href = `/api/download/${techId}`;
  }

  function downloadAll(techIds) {
    techIds.forEach((id, i) => {
      setTimeout(() => { window.location.href = `/api/download/${id}`; }, i * 800);
    });
  }
</script>

</body>
</html>
